// Monthly Report PDF
function genReporte(events,fYear,fMonth){var _c=hexRgb(cpri(loadPrices()));

            return h("div",{style:{fontSize:12,color:"#ccc",lineHeight:1.6}},
              p.contacto&&h("div",null,"👤 ",h("span",{style:{color:"#fff"}},p.contacto)),
              p.telefono&&h("div",null,"📱 ",p.telefono),
              p.tipo&&h("div",null,"📋 ",p.tipo,p.tipo==="Por hora"?" ("+p.horas+"h)":""),
              p.fecha&&h("div",null,"📅 ",fd(p.fecha)),
              p.hora&&h("div",null,"🕐 ",ft(p.hora)),
              p.direccion&&h("div",null,"📍 ",p.direccion),
              p.personas&&h("div",null,"👥 ",p.personas),
              p.tipo==="Serenata"&&p.canciones.some(function(c){return c})&&h("div",null,"🎵 ",p.canciones.filter(function(c){return c}).join(", ")),
              p.notas&&h("div",null,"📝 ",p.notas),
              !p.contacto&&h("div",{style:{color:"var(--cl)"}},"⚠️ No se detectó nombre del cliente")
            );
          })()
        ),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{onClick:function(){setShowImport(false);setImpTxt("")},style:Object.assign({},B("rgba(255,255,255,0.06)"),{color:"#999",border:"1px solid rgba(255,255,255,0.1)"})},"Cancelar"),
          h("button",{onClick:doImport,disabled:!impTxt.trim(),style:Object.assign({},B("#25d366"),{opacity:impTxt.trim()?1:0.4})},"📋 Importar y llenar formulario")
        )
      )
    ),

    // Delete
    delId&&h("div",{onClick:function(){setDelId(null)},style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}},
      h("div",{onClick:function(e){e.stopPropagation()},className:"glass",style:{borderRadius:14,padding:20,border:"1px solid rgba(var(--cpr),var(--cpg),var(--cpb),0.2)",maxWidth:300,width:"100%",animation:"slideIn 0.2s"}},
        h("p",{style:{color:"#fff",fontSize:14,marginBottom:6}},"¿Eliminar este evento?"),
        h("p",{style:{color:"#888",fontSize:11,marginBottom:16}},"Se eliminará permanentemente."),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{onClick:function(){setDelId(null)},style:Object.assign({},B("rgba(255,255,255,0.06)"),{color:"#999",border:"1px solid rgba(255,255,255,0.1)",fontSize:12,padding:"8px 14px"})},"Cancelar"),
          h("button",{onClick:function(){doDel(delId)},style:Object.assign({},B("#8b0000"),{fontSize:12,padding:"8px 14px"})},"Eliminar"))
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(Root));
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(function(){});
})();
</script>
