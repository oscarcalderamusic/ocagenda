<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;min-height:100vh;font-family:'Outfit',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input,select,textarea{font-family:'Outfit',sans-serif;color-scheme:dark}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.08)}30%{transform:scale(1)}45%{transform:scale(1.05)}60%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(120vh) rotate(720deg);opacity:0}}
@keyframes ripple{0%{transform:scale(0);opacity:0.6}100%{transform:scale(4);opacity:0}}
@keyframes cardEnter{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(220,30,30,0.2)}50%{box-shadow:0 0 20px rgba(220,30,30,0.5)}}
.ev-card{transition:transform 0.15s ease,box-shadow 0.15s ease;-webkit-tap-highlight-color:transparent}
.ev-card:active{transform:scale(0.97)!important;box-shadow:0 0 0 rgba(0,0,0,0)!important}
.btn-rip{position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.btn-rip:after{content:'';position:absolute;top:50%;left:50%;width:10px;height:10px;background:rgba(255,255,255,0.4);border-radius:50%;transform:scale(0);opacity:0}
.btn-rip:active:after{animation:ripple 0.5s ease-out}
.glass{background:rgba(10,10,10,0.85)!important;backdrop-filter:blur(20px)!important;-webkit-backdrop-filter:blur(20px)!important;border:1px solid rgba(255,255,255,0.08)!important}
.logo-beat{animation:heartbeat 3s ease-in-out infinite}
.stat-num{animation:countUp 0.6s ease both}
.next-glow{animation:glowPulse 2.5s ease-in-out infinite}
.confetti-piece{position:fixed;width:8px;height:8px;top:-10px;z-index:10000;border-radius:2px;animation:confetti-fall 2.5s ease-in forwards;pointer-events:none}
.sug{position:absolute;top:100%;left:0;right:0;background:#1a1a1a;border:1px solid rgba(220,30,30,0.2);border-radius:8px;z-index:10;max-height:120px;overflow-y:auto}
.sug-i{padding:8px 12px;color:#ccc;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.15s}
.sug-i:hover{background:rgba(220,30,30,0.1);color:#fff}

// GCal
function openGCal(ev){
  var sh=ev.hora||"19:00",p=sh.split(":"),dur=ev.tipo==="Serenata"?1:(ev.horas||1);
  var eh=String(Math.min(23,parseInt(p[0])+dur)).padStart(2,"0");

  var ds=ev.fecha.replace(/-/g,"");

}

  if(ev.telefono)rows.push(["Tel",ev.telefono]);if(ev.direccion)rows.push(["Lugar",ev.direccion]);
  rows.forEach(function(r){doc.setFont(undefined,"bold");doc.setTextColor(100);doc.text(r[0]+":",8,y);doc.setFont(undefined,"normal");doc.setTextColor(40);doc.text(r[1],30,y);y+=5});
  if(ev.tipo==="Serenata"&&ev.canciones.some(function(c){return c})){y+=2;doc.setDrawColor(230);doc.line(8,y,72,y);y+=5;doc.setFont(undefined,"bold");doc.setTextColor(220,30,30);doc.text("CANCIONES",8,y);y+=5;doc.setFont(undefined,"normal");doc.setTextColor(40);ev.canciones.filter(function(c){return c}).forEach(function(c,i){doc.text((i+1)+". "+c,10,y);y+=4.5})}
  y+=4;doc.setFillColor(245);doc.rect(5,y-3,70,28,"F");doc.setDrawColor(220,30,30);doc.rect(5,y-3,70,28,"S");
  doc.setFontSize(10);doc.setFont(undefined,"bold");doc.setTextColor(60);doc.text("Total:",10,y+2);doc.text(fm(total),70,y+2,{align:"right"});y+=7;

  doc.text(new Date().toLocaleString("es-MX"),40,y,{align:"center"});y+=4;
  doc.text("oscarcalderamusic.netlify.app",40,y,{align:"center"});
  doc.save("Recibo_"+folio(ev.id,evs)+"_"+ev.contacto.replace(/\s/g,"_")+".pdf");
}

// Monthly Report PDF
function genReporte(events,fYear,fMonth){
  var J=window.jspdf.jsPDF,doc=new J({unit:"mm",format:"letter"});
  var yr=parseInt(fYear)||new Date().getFullYear();var mo=fMonth!=="all"?parseInt(fMonth):-1;

  var evs=events.filter(function(x){var d=new Date(x.fecha+"T00:00:00");return d.getFullYear()===yr&&(mo<0||d.getMonth()===mo)}).sort(function(a,b){return new Date(a.fecha)-new Date(b.fecha)});
  var tI=0,tA=0;evs.forEach(function(x){if(x.estado!=="Cancelado"){tI+=ct(x);tA+=(x.anticipo||0)}});
  doc.setFillColor(220,30,30);doc.rect(0,0,216,30,"F");doc.setTextColor(255);doc.setFontSize(18);doc.setFont(undefined,"bold");
  doc.text("OSCAR CALDERA - REPORTE",108,14,{align:"center"});doc.setFontSize(9);doc.setFont(undefined,"normal");doc.text(moName+" "+yr,108,23,{align:"center"});
  var y=40;doc.setTextColor(60);doc.setFontSize(10);doc.setFont(undefined,"bold");
  doc.text("Eventos: "+evs.length+"    Ingresos: "+fm(tI)+"    Cobrado: "+fm(tA)+"    Pendiente: "+fm(tI-tA),14,y);y+=10;
  doc.setDrawColor(220,30,30);doc.line(14,y,200,y);y+=6;
  doc.setFontSize(8);doc.setTextColor(100);doc.text("FOLIO",14,y);doc.text("FECHA",38,y);doc.text("TIPO",58,y);doc.text("CLIENTE",80,y);doc.text("ESTADO",125,y);doc.text("TOTAL",150,y);doc.text("ANTICIPO",175,y);y+=5;
  doc.line(14,y,200,y);y+=4;doc.setFont(undefined,"normal");doc.setTextColor(40);
  evs.forEach(function(ev,i){if(y>260){doc.addPage();y=20}doc.text(folio(ev.id,events),14,y);doc.text(fd(ev.fecha),38,y);doc.text(ev.tipo,58,y);doc.text((ev.contacto||"").substring(0,18),80,y);doc.text(ev.estado,125,y);doc.text(fm(ct(ev)),150,y);doc.text(fm(ev.anticipo||0),175,y);y+=5});

// Notifications
function reqNotif(){if("Notification"in window&&Notification.permission==="default")Notification.requestPermission()}
function chkReminders(evs){if(!("Notification"in window)||Notification.permission!=="granted")return;var now=Date.now();evs.forEach(function(ev){if(ev.estado==="Cancelado"||!ev.fecha||!ev.hora)return;var dt=new Date(ev.fecha+"T"+ev.hora+":00").getTime(),d=dt-now;if(d>0&&d<=7200000&&d>7140000)new Notification("🎤 Evento en 2 horas",{body:ev.tipo+" - "+ev.contacto,icon:"/icons/icon-192.svg"});if(d>0&&d<=86400000&&d>86340000)new Notification("🎤 Evento mañana",{body:ev.tipo+" - "+ev.contacto+" "+ft(ev.hora),icon:"/icons/icon-192.svg"})})}

function shareWA(ev){var total=ct(ev),saldo=total-(ev.anticipo||0);var m="🎤 *Oscar Caldera - Evento Musical*\n\n📋 *Tipo:* "+ev.tipo+"\n📅 *Fecha:* "+fd(ev.fecha)+"\n";if(ev.hora)m+="🕐 *Inicio:* "+ft(ev.hora)+"\n🕐 *Fin:* "+calcEnd(ev.hora,ev.tipo==="Por hora"?ev.horas:1)+"\n";m+="💰 *Total:* "+fm(total)+"\n";if(ev.anticipo)m+="💵 *Anticipo:* "+fm(ev.anticipo)+"\n📊 *Restante:* "+fm(saldo)+"\n";if(ev.tipo==="Serenata"&&ev.canciones.some(function(c){return c})){m+="\n🎵 *Canciones:*\n";ev.canciones.filter(function(c){return c}).forEach(function(c,i){m+=(i+1)+". "+c+"\n   ▶ "+ytK(c)+"\n"})}m+="\n✅ *Estado:* "+ev.estado;window.open("https://wa.me/?text="+encodeURIComponent(m),"_blank")}

// Chart
function MChart(props){var ref=ur(null),cRef=ur(null);ue(function(){if(!ref.current)return;if(cRef.current)cRef.current.destroy();var d=new Array(12).fill(0),a=new Array(12).fill(0);var yr=parseInt(props.year)||new Date().getFullYear();props.events.forEach(function(ev){var dt=new Date(ev.fecha+"T00:00:00");if(dt.getFullYear()===yr&&ev.estado!=="Cancelado"){d[dt.getMonth()]+=ct(ev);a[dt.getMonth()]+=(ev.anticipo||0)}});cRef.current=new Chart(ref.current,{type:"bar",data:{labels:MS.map(function(m){return m.slice(0,3)}),datasets:[{label:"Total",data:d,backgroundColor:"rgba(220,30,30,0.6)",borderColor:"#dc1e1e",borderWidth:1,borderRadius:4},{label:"Cobrado",data:a,backgroundColor:"rgba(0,135,90,0.6)",borderColor:"#00875a",borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#999",font:{family:"Outfit"}}}},scales:{x:{ticks:{color:"#888"},grid:{color:"rgba(255,255,255,0.03)"}},y:{ticks:{color:"#888",callback:function(v){return"$"+v.toLocaleString()}},grid:{color:"rgba(255,255,255,0.05)"}}}}});return function(){if(cRef.current)cRef.current.destroy()}},[props.events,props.year]);return h("canvas",{ref:ref,style:{width:"100%",height:200}})}

// ============ PIN LOCK SCREEN ============
var APP_PIN="2108";
function PinScreen(props){
  var _pin=us(""),pin=_pin[0],setPin=_pin[1];
  var _err=us(false),err=_err[0],setErr=_err[1];

  function addDigit(d){if(pin.length>=4)return;var next=pin+d;setPin(next);setErr(false);
    if(next.length===4){if(next===APP_PIN){sessionStorage.setItem("oc-unlocked","1");props.onUnlock()}else{setErr(true);setShake(true);setTimeout(function(){setPin("");setShake(false)},600)}}}
  function del(){setPin(pin.slice(0,-1));setErr(false)}
  return h("div",{style:{minHeight:"100vh",background:"#000",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}},

    h("h1",{style:{color:"#dc1e1e",fontSize:22,fontWeight:800,marginBottom:4,fontFamily:"'Outfit',sans-serif"}},"OC AGENDA"),

    err&&h("p",{style:{color:"#ff3333",fontSize:12,marginTop:8,marginBottom:-8,fontFamily:"'Outfit',sans-serif",animation:"fadeIn 0.2s"}},"PIN incorrecto"),
